# 103 nginx 分流配置
# 5 个商品搜索/登录前缀 → 192.168.1.27:8089（Windows 搜索主机）
# 其他 API → 本机 backend-web:8089

upstream main_backend {
    server 127.0.0.1:8089;
    keepalive 32;
}

upstream search_backend {
    server 192.168.1.27:8089 max_fails=1 fail_timeout=10s;
}

# gzip 压缩
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/xml text/javascript
           application/javascript application/json application/xml;

server {
    listen 9000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- 前端静态资源 ---
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- 后端共享静态文件（上传图片、二维码等） ---
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # --- 搜索 / 登录类 API → Windows 27 ---
    # 命中则转发；27 关机时由于 fail_timeout 快速失败，前端获得明确错误
    location ~ ^/api/v1/(items/search|goofish/crawler|compass/goofish|qr-login|password-login)(/|$) {
        proxy_pass http://search_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;   # 搜索可能较慢，爬虫 detail 拉取 5 分钟

        # 27 不可用时立即 502，不重试其他上游
        proxy_next_upstream off;
    }

    # --- 其他 API → 本机 backend-web（含 WebSocket 升级） ---
    location /api/ {
        proxy_pass http://main_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 升级支持（聊天等长连接）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 86400s;  # 长连接保活 24 小时
    }

    # --- 前端 SPA 回退 ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
